name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'data/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          # 設定 GitHub Pages base path（格式：/repo-name/）
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          # 如需手動觸發爬蟲功能，在 GitHub Secrets 設定以下變數
          VITE_GH_OWNER: ${{ secrets.VITE_GH_OWNER }}
          VITE_GH_REPO: ${{ secrets.VITE_GH_REPO }}
          VITE_GH_TOKEN: ${{ secrets.VITE_GH_TOKEN }}

      - name: Copy data files to dist
        # 將最新的 data/ 一起打包進部署產物
        run: cp -r data/ frontend/dist/data/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
