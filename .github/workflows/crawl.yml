name: Crawl & Analyze

on:
  schedule:
    # 每 6 小時執行一次（UTC 時間 0, 6, 12, 18 點）
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      keywords:
        description: '額外追蹤關鍵字（逗號分隔，例如：chatgpt,穿搭）'
        required: false
        default: ''

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允許 commit 回 repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run crawler
        run: python scripts/main.py ${{ github.event.inputs.keywords && format('--keywords "{0}"', github.event.inputs.keywords) || '' }}
        # 不需要任何 token，使用公開模式抓取

      - name: Commit data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update trend data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
